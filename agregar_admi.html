<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Administrador</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GENERAL */
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#4a148c;
}

/* HEADER */
header{
background:#9c27b0;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* TEXTO HEADER */
.user-text{
font-size:22px;
font-weight:bold;
}

/* ADMIN TEXTO (IGUAL A TODOS) */
#nombreUsuario{
font-size:18px;
font-weight:bold;
background:white;
color:#4a148c;
padding:6px 12px;
border-radius:8px;
}

/* CONTENEDOR */
.main{
display:flex;
justify-content:center;
align-items:center;
min-height:90vh;
}

/* TARJETA */
.container{
background:white;
padding:40px;
border-radius:12px;
width:420px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

/* TITULO */
h2{
margin-bottom:20px;
color:#4a148c;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
border:1px solid #9c27b0;
}

/* SOLO LECTURA */
.readonly{
background:#f3f3f3;
font-weight:bold;
color:#555;
}

/* BOTONES */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#9c27b0;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#7b1fa2;
}

/* BOTÓN SECUNDARIO */
.btn-secundario{
background:#6a1b9a;
}

.btn-secundario:hover{
background:#4a148c;
}

/* MENSAJE */
.mensaje{
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div class="user-text">Sistema De Registro DIF</div>
<div id="nombreUsuario"></div>
</header>

<div class="main">

<div class="container">
<h2>Registrar Administrador</h2>

<form id="formAdmin" autocomplete="off">

<input type="text" style="display:none">
<input type="password" style="display:none">

<input type="text" value="Administrador" class="readonly" readonly>

<input type="text" name="usuario" placeholder="Usuario" required autocomplete="new-username">

<input type="text" name="apellido" placeholder="Apellido" required autocomplete="off">

<input type="email" name="correo" placeholder="Correo electrónico" required autocomplete="off">

<input type="text" name="telefono" placeholder="Teléfono" required autocomplete="off">

<input 
type="text" 
name="curp" 
placeholder="CURP (18 caracteres)"
maxlength="18"
pattern="[A-Z0-9]{18}"
required
autocomplete="off"
oninput="this.value = this.value.toUpperCase()"
style="text-transform: uppercase;"
>

<input type="password" name="contrasena" placeholder="Contraseña" required autocomplete="new-password">

<button type="submit">Registrar Administrador</button>

</form>

<button class="btn-secundario" onclick="irAdministrador()">
⬅ Regresar
</button>

<div class="mensaje" id="mensaje"></div>

</div>

</div>

<script>

/* LIMPIAR CAMPOS */
window.onload = function() {
const form = document.getElementById("formAdmin");

form.querySelectorAll("input").forEach(input => {
if(!input.readOnly){
input.value = "";
}
});
};

/* SESIÓN */
const usuarioSesion = localStorage.getItem('usuario');

if (!usuarioSesion) {
window.location.replace('index.html');
}

/* 🔥 FORMATO UNIFICADO */
document.getElementById('nombreUsuario').textContent =
`Administrador: ${usuarioSesion}`;


/* FORM */
document.getElementById("formAdmin").addEventListener("submit", function(e){
e.preventDefault();

const formData = new FormData(this);

const data = {
usuario: formData.get("usuario"),
apellido: formData.get("apellido"),
correo: formData.get("correo"),
telefono: formData.get("telefono"),
curp: formData.get("curp"),
contrasena: formData.get("contrasena")
};

fetch("http://localhost/modulo/php/agregar_admi.php", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
})
.then(res => res.json())
.then(response => {

const mensaje = document.getElementById("mensaje");

if(response.success){
mensaje.style.color = "green";
mensaje.innerText = response.mensaje + " Ficha: " + response.ficha;
document.getElementById("formAdmin").reset();
}else{
mensaje.style.color = "red";
mensaje.innerText = response.mensaje;
}

})
.catch(() => {
document.getElementById("mensaje").innerText = "❌ Error al conectar con el servidor.";
});

});

/* REGRESAR */
function irAdministrador() {
window.location.replace("administrador.html");
}

</script>

</body>
</html>
