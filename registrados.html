<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios Registrados</title>

<style>

/* GENERAL */
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#4a148c;
}

/* HEADER (igual al otro) */
header{
background:#9c27b0;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* TEXTO HEADER */
.user-text{
font-size:22px;
font-weight:bold;
}

/* ADMIN TEXTO (igual estilo) */
#nombreUsuario{
font-size:18px;
font-weight:bold;
background:white;
color:#4a148c;
padding:6px 12px;
border-radius:8px;
}

/* CONTENEDOR */
.contenedor{
width:95%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
overflow-x:auto;
}

/* BOTÓN REGRESAR */
.regresar{
background:#9c27b0;
color:white;
margin-bottom:15px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.regresar:hover{
background:#7b1fa2;
}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
font-size:14px;
min-width:900px;
}

th,td{
padding:10px;
border:1px solid #eee;
text-align:center;
}

th{
background:#6a1b9a;
color:white;
}

tr:nth-child(even){
background:#f9f6fc;
}

/* INPUT PASSWORD */
.input-pass{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
display:none;
}

/* BOTONES */
button{
padding:6px 10px;
border:none;
cursor:pointer;
margin:2px;
border-radius:6px;
color:white;
font-size:12px;
}

/* COLORES */
.editar{background:#9c27b0;}
.guardar{background:#4caf50; display:none;}
.cancelar{background:#ff9800; display:none;}
.eliminar{background:#e53935;}

.editar:hover{background:#7b1fa2;}
.guardar:hover{background:#388e3c;}
.cancelar:hover{background:#f57c00;}
.eliminar:hover{background:#c62828;}

/* MENSAJES */
.mensaje{
display:none;
padding:12px;
margin-bottom:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.exito{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

/* RESPONSIVE */
@media (max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
}

table{
font-size:12px;
}

button{
font-size:11px;
padding:5px;
}

}

</style>
</head>

<body>

<header>
<div class="user-text">Sistema De Registro DIF</div>
<div id="nombreUsuario"></div>
</header>

<div class="contenedor">

<button class="regresar" onclick="regresar()">⬅ Regresar</button>

<div id="mensaje" class="mensaje"></div>

<table id="tablaUsuarios">

<thead>
<tr>
<th>Ficha</th>
<th>Usuario</th>
<th>Apellido</th>
<th>Correo</th>
<th>Teléfono</th>
<th>CURP</th>
<th>Cargo</th>
<th>Nueva Contraseña</th>
<th>Acciones</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

/* SESIÓN */
const usuarioSesion = localStorage.getItem('usuario');
if (!usuarioSesion) window.location.replace('index.html');

/* 🔥 MISMO FORMATO QUE EL OTRO */
document.getElementById('nombreUsuario').textContent =
`Administrador: ${usuarioSesion}`;

/* MENSAJE */
function mostrarMensaje(texto,tipo){
let m=document.getElementById("mensaje");
m.innerText=texto;
m.className="mensaje "+tipo;
m.style.display="block";
setTimeout(()=>{ m.style.display="none"; },3000);
}

/* CARGAR USUARIOS */
function cargarUsuarios(){

fetch("obtener_usuarios.php")
.then(res=>res.json())
.then(data=>{

const tabla=document.querySelector("#tablaUsuarios tbody");
tabla.innerHTML="";

data.forEach(u=>{

tabla.innerHTML+=`
<tr>
<td>${u.ficha}</td>
<td contenteditable="false">${u.usuario}</td>
<td contenteditable="false">${u.apellido}</td>
<td contenteditable="false">${u.correo}</td>
<td contenteditable="false">${u.telefono}</td>
<td contenteditable="false">${u.curp}</td>
<td contenteditable="false">${u.cargo}</td>

<td>
<input type="password" class="input-pass" placeholder="Nueva contraseña">
</td>

<td>
<button class="editar" onclick="editarFila(this)">Editar</button>
<button class="guardar" onclick="guardarFila(this,${u.id})">Guardar</button>
<button class="cancelar" onclick="cargarUsuarios()">Cancelar</button>
<button class="eliminar" onclick="eliminarUsuario(${u.id})">Eliminar</button>
</td>
</tr>
`;

});

});

}

/* EDITAR */
function editarFila(btn){
let fila=btn.parentNode.parentNode;

for(let i=1;i<=6;i++){
fila.children[i].contentEditable="true";
}

fila.querySelector(".input-pass").style.display="block";

btn.style.display="none";
fila.querySelector(".guardar").style.display="inline-block";
fila.querySelector(".cancelar").style.display="inline-block";
}

/* GUARDAR */
function guardarFila(btn,id){

let fila=btn.parentNode.parentNode;

let nuevaPass = fila.querySelector(".input-pass").value;

let datos={
accion:"editar",
id:id,
usuario:fila.children[1].innerText,
apellido:fila.children[2].innerText,
correo:fila.children[3].innerText,
telefono:fila.children[4].innerText,
curp:fila.children[5].innerText,
cargo:fila.children[6].innerText,
contrasena:nuevaPass
};

fetch("gestionar_usuario.php",{
method:"POST",
body:JSON.stringify(datos)
})
.then(res=>res.json())
.then(r=>{
if(r.success){
mostrarMensaje("Usuario actualizado ✅","exito");
cargarUsuarios();
}else{
mostrarMensaje("Error ❌","error");
}
});

}

/* ELIMINAR */
function eliminarUsuario(id){
if(!confirm("¿Eliminar usuario?")) return;

fetch("gestionar_usuario.php",{
method:"POST",
body:JSON.stringify({accion:"eliminar",id:id})
})
.then(res=>res.json())
.then(r=>{
if(r.success){
mostrarMensaje("Eliminado correctamente","exito");
cargarUsuarios();
}else{
mostrarMensaje("Error al eliminar","error");
}
});
}

/* REGRESAR */
function regresar(){
window.location.replace("administrador.html");
}

/* INICIAR */
cargarUsuarios();

</script>

</body>
</html>
